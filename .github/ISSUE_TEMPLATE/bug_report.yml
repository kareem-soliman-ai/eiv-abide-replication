name: Bug Report
description: Report a bug or unexpected behaviour in the analysis pipeline
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the issue (e.g., command run, data source)
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: "Python version, OS, relevant package versions (pip freeze output helpful)"
    validations:
      required: false
